<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1100" font-family="ui-monospace, Menlo, Consolas, monospace">

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#202020"/>
    </marker>
    <marker id="arrowRed" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#B00020"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#0B7A3B"/>
    </marker>
    <marker id="arrowBlue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1E4E8C"/>
    </marker>
  </defs>

  <rect width="1600" height="1100" fill="#FBFBFA"/>

  <!-- Title banner -->
  <rect x="0" y="0" width="1600" height="70" fill="#111111"/>
  <text x="40" y="46" font-size="28" font-weight="700" fill="#FFFFFF">ANVIL  -  the closed-loop orchestrator</text>
  <text x="1560" y="46" font-size="14" fill="#9A9A9A" text-anchor="end">Evidence closes every loop. Bad output is diagnostic. The agent is disposable; the ledger is not.</text>

  <!-- The Iron Rule banner -->
  <rect x="40" y="90" width="1520" height="50" fill="#B00020" rx="6"/>
  <text x="800" y="122" font-size="20" font-weight="700" fill="#FFFFFF" text-anchor="middle">#1 RULE  -  NEVER FIX BAD OUTPUT.  DIAGNOSE THE INPUT, CAPTURE THE LESSON, RESET, RE-RUN.</text>

  <!-- Layer labels -->
  <text x="40" y="175" font-size="13" font-weight="700" fill="#555555">INTAKE LAYER</text>
  <line x1="40" y1="182" x2="1560" y2="182" stroke="#E2E2E2" stroke-width="1"/>

  <!-- INTAKE -->
  <g>
    <rect x="60" y="200" width="180" height="70" rx="8" fill="#FFFFFF" stroke="#202020" stroke-width="2"/>
    <text x="150" y="230" font-size="14" font-weight="700" text-anchor="middle" fill="#111111">User Prompt</text>
    <text x="150" y="250" font-size="11" text-anchor="middle" fill="#666666">"Add rate limiting"</text>
  </g>

  <g>
    <rect x="300" y="200" width="200" height="70" rx="8" fill="#FFFFFF" stroke="#202020" stroke-width="2"/>
    <text x="400" y="230" font-size="14" font-weight="700" text-anchor="middle" fill="#111111">CONTRACT</text>
    <text x="400" y="250" font-size="11" text-anchor="middle" fill="#666666">Machine-evaluable success</text>
  </g>

  <g>
    <rect x="560" y="200" width="200" height="70" rx="8" fill="#FFFFFF" stroke="#202020" stroke-width="2"/>
    <text x="660" y="230" font-size="14" font-weight="700" text-anchor="middle" fill="#111111">PLAN (DAG)</text>
    <text x="660" y="250" font-size="11" text-anchor="middle" fill="#666666">Atomic tasks, wave-ordered</text>
  </g>

  <!-- Intake arrows -->
  <line x1="240" y1="235" x2="300" y2="235" stroke="#202020" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="500" y1="235" x2="560" y2="235" stroke="#202020" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Human approval gate (thin, one-shot) -->
  <g>
    <rect x="300" y="290" width="200" height="30" rx="4" fill="#FFF3D6" stroke="#C08A00" stroke-width="1" stroke-dasharray="4 2"/>
    <text x="400" y="310" font-size="11" text-anchor="middle" fill="#7A5500" font-style="italic">human confirms contract (1 of 2 touchpoints)</text>
  </g>

  <!-- Loop label -->
  <text x="40" y="360" font-size="13" font-weight="700" fill="#555555">EXECUTION LOOP  -  per task, per wave</text>
  <line x1="40" y1="367" x2="1160" y2="367" stroke="#E2E2E2" stroke-width="1"/>

  <!-- Loop container -->
  <rect x="60" y="385" width="1100" height="420" rx="12" fill="#F5F5F3" stroke="#D0D0CC" stroke-width="1"/>

  <!-- DISPATCH -->
  <g>
    <rect x="100" y="420" width="170" height="60" rx="8" fill="#1E4E8C" stroke="#12345D" stroke-width="2"/>
    <text x="185" y="450" font-size="14" font-weight="700" text-anchor="middle" fill="#FFFFFF">DISPATCH</text>
    <text x="185" y="468" font-size="10" text-anchor="middle" fill="#BBD2F0">wave -&gt; worktree pool</text>
  </g>

  <!-- Parallel executors -->
  <g>
    <rect x="320" y="395" width="150" height="48" rx="6" fill="#FFFFFF" stroke="#1E4E8C" stroke-width="1.5"/>
    <text x="395" y="415" font-size="12" font-weight="600" text-anchor="middle" fill="#111111">EXECUTE #1</text>
    <text x="395" y="432" font-size="10" text-anchor="middle" fill="#666666">fresh subagent</text>

    <rect x="320" y="455" width="150" height="48" rx="6" fill="#FFFFFF" stroke="#1E4E8C" stroke-width="1.5"/>
    <text x="395" y="475" font-size="12" font-weight="600" text-anchor="middle" fill="#111111">EXECUTE #2</text>
    <text x="395" y="492" font-size="10" text-anchor="middle" fill="#666666">fresh subagent</text>

    <rect x="320" y="515" width="150" height="48" rx="6" fill="#FFFFFF" stroke="#1E4E8C" stroke-width="1.5"/>
    <text x="395" y="535" font-size="12" font-weight="600" text-anchor="middle" fill="#111111">EXECUTE #N</text>
    <text x="395" y="552" font-size="10" text-anchor="middle" fill="#666666">fresh subagent</text>
  </g>

  <!-- Dispatch fan-out arrows -->
  <line x1="270" y1="430" x2="320" y2="419" stroke="#1E4E8C" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
  <line x1="270" y1="450" x2="320" y2="479" stroke="#1E4E8C" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
  <line x1="270" y1="470" x2="320" y2="539" stroke="#1E4E8C" stroke-width="1.5" marker-end="url(#arrowBlue)"/>

  <!-- VERIFY (4-level) -->
  <g>
    <rect x="520" y="395" width="200" height="170" rx="8" fill="#FFFFFF" stroke="#202020" stroke-width="2"/>
    <text x="620" y="418" font-size="14" font-weight="700" text-anchor="middle" fill="#111111">VERIFY</text>
    <text x="620" y="434" font-size="9" text-anchor="middle" fill="#888888">evidence gate, 4 levels</text>
    <line x1="540" y1="444" x2="700" y2="444" stroke="#E2E2E2"/>
    <text x="540" y="462" font-size="11" fill="#111111">1. EXISTS</text>
    <text x="710" y="462" font-size="10" text-anchor="end" fill="#888888">file/symbol present</text>
    <text x="540" y="482" font-size="11" fill="#111111">2. SUBSTANTIVE</text>
    <text x="710" y="482" font-size="10" text-anchor="end" fill="#888888">not stub</text>
    <text x="540" y="502" font-size="11" fill="#111111">3. WIRED</text>
    <text x="710" y="502" font-size="10" text-anchor="end" fill="#888888">called from path</text>
    <text x="540" y="522" font-size="11" fill="#111111">4. FUNCTIONAL</text>
    <text x="710" y="522" font-size="10" text-anchor="end" fill="#888888">test output green</text>
    <text x="620" y="548" font-size="9" font-style="italic" text-anchor="middle" fill="#B00020">existence != implementation</text>
  </g>

  <!-- Execute to Verify -->
  <line x1="470" y1="419" x2="520" y2="440" stroke="#1E4E8C" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
  <line x1="470" y1="479" x2="520" y2="480" stroke="#1E4E8C" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
  <line x1="470" y1="539" x2="520" y2="520" stroke="#1E4E8C" stroke-width="1.5" marker-end="url(#arrowBlue)"/>

  <!-- JUDGE (Court) -->
  <g>
    <rect x="780" y="395" width="220" height="170" rx="8" fill="#FFFFFF" stroke="#202020" stroke-width="2"/>
    <text x="890" y="418" font-size="14" font-weight="700" text-anchor="middle" fill="#111111">JUDGE (the Court)</text>
    <text x="890" y="434" font-size="9" text-anchor="middle" fill="#888888">adversarial, fresh context</text>
    <line x1="800" y1="444" x2="980" y2="444" stroke="#E2E2E2"/>
    <text x="890" y="462" font-size="11" font-weight="600" text-anchor="middle" fill="#111111">pass 1  -  spec compliance</text>
    <text x="890" y="478" font-size="10" text-anchor="middle" fill="#888888">does evidence match contract?</text>
    <text x="890" y="500" font-size="11" font-weight="600" text-anchor="middle" fill="#111111">pass 2  -  code quality</text>
    <text x="890" y="516" font-size="10" text-anchor="middle" fill="#888888">would I merge this?</text>
    <text x="890" y="540" font-size="9" font-style="italic" text-anchor="middle" fill="#B00020">"Do Not Trust the Report"</text>
    <text x="890" y="554" font-size="9" font-style="italic" text-anchor="middle" fill="#888888">sees only contract + diff + test output</text>
  </g>

  <line x1="720" y1="480" x2="780" y2="480" stroke="#202020" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- PASS / FAIL branching -->
  <g>
    <polygon points="1020,445 1070,480 1020,515 970,480" fill="#FFFFFF" stroke="#202020" stroke-width="2"/>
    <text x="1020" y="485" font-size="12" font-weight="700" text-anchor="middle" fill="#111111">pass?</text>
  </g>
  <line x1="1000" y1="480" x2="970" y2="480" stroke="#202020" stroke-width="2" marker-end="url(#arrow)" marker-start="url(#arrow)"/>

  <!-- PASS path -->
  <g>
    <rect x="1090" y="405" width="120" height="50" rx="6" fill="#0B7A3B" stroke="#065A2A" stroke-width="2"/>
    <text x="1150" y="430" font-size="13" font-weight="700" text-anchor="middle" fill="#FFFFFF">MARK DONE</text>
    <text x="1150" y="446" font-size="10" text-anchor="middle" fill="#CDEFD3">next task</text>
  </g>
  <line x1="1060" y1="470" x2="1090" y2="440" stroke="#0B7A3B" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <text x="1062" y="455" font-size="10" fill="#0B7A3B">pass</text>

  <!-- FAIL path -->
  <g>
    <rect x="1090" y="510" width="120" height="50" rx="6" fill="#B00020" stroke="#7A0016" stroke-width="2"/>
    <text x="1150" y="535" font-size="13" font-weight="700" text-anchor="middle" fill="#FFFFFF">RESET</text>
    <text x="1150" y="551" font-size="10" text-anchor="middle" fill="#FFD0D7">kill session, drop cache</text>
  </g>
  <line x1="1060" y1="495" x2="1090" y2="525" stroke="#B00020" stroke-width="2" marker-end="url(#arrowRed)"/>
  <text x="1062" y="513" font-size="10" fill="#B00020">fail</text>

  <!-- DIAGNOSE -->
  <g>
    <rect x="1090" y="600" width="120" height="50" rx="6" fill="#FFFFFF" stroke="#B00020" stroke-width="2"/>
    <text x="1150" y="625" font-size="12" font-weight="700" text-anchor="middle" fill="#111111">DIAGNOSE</text>
    <text x="1150" y="640" font-size="10" text-anchor="middle" fill="#666666">input was wrong</text>
  </g>
  <line x1="1150" y1="560" x2="1150" y2="600" stroke="#B00020" stroke-width="2" marker-end="url(#arrowRed)"/>

  <!-- LESSON -->
  <g>
    <rect x="1090" y="685" width="120" height="50" rx="6" fill="#FFFFFF" stroke="#B00020" stroke-width="2"/>
    <text x="1150" y="710" font-size="12" font-weight="700" text-anchor="middle" fill="#111111">LESSON</text>
    <text x="1150" y="725" font-size="10" text-anchor="middle" fill="#666666">extracted, indexed</text>
  </g>
  <line x1="1150" y1="650" x2="1150" y2="685" stroke="#B00020" stroke-width="2" marker-end="url(#arrowRed)"/>

  <!-- Loop back (improved input) -->
  <path d="M 1090 710 Q 700 770 500 730 Q 300 700 185 490" stroke="#B00020" stroke-width="2" fill="none" stroke-dasharray="6 4" marker-end="url(#arrowRed)"/>
  <text x="600" y="780" font-size="11" font-style="italic" fill="#B00020">improved input  -  re-dispatch with lesson injected</text>

  <!-- LEDGER sidebar -->
  <text x="1200" y="175" font-size="13" font-weight="700" fill="#555555">PERSISTENCE</text>
  <line x1="1200" y1="182" x2="1560" y2="182" stroke="#E2E2E2" stroke-width="1"/>
  <g>
    <rect x="1220" y="200" width="340" height="230" rx="8" fill="#FFFFFF" stroke="#202020" stroke-width="2"/>
    <text x="1390" y="225" font-size="15" font-weight="700" text-anchor="middle" fill="#111111">THE LEDGER</text>
    <text x="1390" y="242" font-size="10" text-anchor="middle" fill="#888888">append-only, pattern-indexed</text>
    <line x1="1240" y1="252" x2="1540" y2="252" stroke="#E2E2E2"/>
    <text x="1240" y="272" font-size="11" font-weight="600" fill="#111111">pattern:</text>
    <text x="1320" y="272" font-size="11" fill="#666666">rate-limit, middleware, auth</text>
    <text x="1240" y="292" font-size="11" font-weight="600" fill="#111111">failure:</text>
    <text x="1320" y="292" font-size="11" fill="#666666">stub body, missing threshold</text>
    <text x="1240" y="312" font-size="11" font-weight="600" fill="#111111">lesson:</text>
    <text x="1320" y="312" font-size="11" fill="#666666">specify window + algo up-front</text>
    <text x="1240" y="332" font-size="11" font-weight="600" fill="#111111">evidence:</text>
    <text x="1320" y="332" font-size="11" fill="#666666">pytest returns 0-of-3</text>
    <text x="1240" y="352" font-size="11" font-weight="600" fill="#111111">hit count:</text>
    <text x="1320" y="352" font-size="11" fill="#666666">7 (prevented 4 re-occurrences)</text>
    <line x1="1240" y1="368" x2="1540" y2="368" stroke="#E2E2E2"/>
    <text x="1390" y="390" font-size="10" font-style="italic" text-anchor="middle" fill="#666666">queried at Contract time;</text>
    <text x="1390" y="405" font-size="10" font-style="italic" text-anchor="middle" fill="#666666">injected as counter-examples;</text>
    <text x="1390" y="420" font-size="10" font-style="italic" text-anchor="middle" fill="#666666">grows with every reset.</text>
  </g>

  <!-- Contract queries ledger -->
  <path d="M 500 235 Q 850 180 1220 260" stroke="#1E4E8C" stroke-width="1.5" fill="none" stroke-dasharray="3 3" marker-end="url(#arrowBlue)"/>
  <text x="860" y="175" font-size="10" font-style="italic" fill="#1E4E8C">query past lessons</text>

  <!-- Lesson writes to ledger -->
  <path d="M 1210 710 Q 1320 600 1320 430" stroke="#B00020" stroke-width="1.5" fill="none" stroke-dasharray="3 3" marker-end="url(#arrowRed)"/>
  <text x="1285" y="590" font-size="10" font-style="italic" fill="#B00020">append</text>

  <!-- Ship gate -->
  <text x="40" y="840" font-size="13" font-weight="700" fill="#555555">SHIP LAYER</text>
  <line x1="40" y1="847" x2="1560" y2="847" stroke="#E2E2E2" stroke-width="1"/>

  <g>
    <rect x="100" y="865" width="220" height="65" rx="8" fill="#FFFFFF" stroke="#202020" stroke-width="2"/>
    <text x="210" y="893" font-size="14" font-weight="700" text-anchor="middle" fill="#111111">CONTRACT REPLAY</text>
    <text x="210" y="912" font-size="10" text-anchor="middle" fill="#666666">all criteria green, fresh evidence</text>
  </g>

  <g>
    <rect x="380" y="865" width="220" height="65" rx="8" fill="#FFFFFF" stroke="#202020" stroke-width="2"/>
    <text x="490" y="893" font-size="14" font-weight="700" text-anchor="middle" fill="#111111">FINAL JUDGE</text>
    <text x="490" y="912" font-size="10" text-anchor="middle" fill="#666666">whole-branch adversarial review</text>
  </g>

  <g>
    <rect x="660" y="865" width="220" height="65" rx="8" fill="#FFF3D6" stroke="#C08A00" stroke-width="2"/>
    <text x="770" y="893" font-size="14" font-weight="700" text-anchor="middle" fill="#7A5500">PR OPEN</text>
    <text x="770" y="912" font-size="10" text-anchor="middle" fill="#7A5500">human merges (2 of 2 touchpoints)</text>
  </g>

  <line x1="320" y1="898" x2="380" y2="898" stroke="#202020" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="600" y1="898" x2="660" y2="898" stroke="#202020" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- all tasks done path -->
  <path d="M 1210 430 Q 1400 600 1400 900 Q 1400 900 900 900" stroke="#0B7A3B" stroke-width="2" fill="none" marker-end="url(#arrowGreen)"/>
  <text x="1420" y="700" font-size="10" font-style="italic" fill="#0B7A3B">all tasks pass</text>

  <!-- Observability layer -->
  <text x="40" y="970" font-size="13" font-weight="700" fill="#555555">OBSERVABILITY LAYER  -  wraps everything, always on</text>
  <line x1="40" y1="977" x2="1560" y2="977" stroke="#E2E2E2" stroke-width="1"/>

  <g>
    <rect x="60" y="995" width="1500" height="85" rx="8" fill="#F0EFED" stroke="#BEBDBA" stroke-width="1"/>
    <text x="80" y="1020" font-size="12" font-weight="700" fill="#111111">trace.jsonl</text>
    <text x="80" y="1038" font-size="10" fill="#555555">tool, agent, task, phase, evidence, duration, cost, outcome</text>
    <text x="80" y="1056" font-size="10" fill="#555555">-&gt; reset rate  |  time-to-green  |  contract pass rate  |  lesson hit rate  |  judge reject rate</text>
    <text x="80" y="1072" font-size="10" font-style="italic" fill="#666666">calibration: per-agent confidence vs. outcome; sycophancy detector; theatre-drift alarm</text>

    <text x="980" y="1020" font-size="12" font-weight="700" fill="#111111">hooks (always on)</text>
    <text x="980" y="1038" font-size="10" fill="#555555">session-start (bootstrap)  |  pre-tool-use (hard blocks)</text>
    <text x="980" y="1056" font-size="10" fill="#555555">post-tool-use (log)  |  user-prompt-submit (route)  |  stop (replay contract)</text>
  </g>

</svg>
